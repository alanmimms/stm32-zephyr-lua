[global]
# Protocol basics
network_transport       L2
delay_mechanism         P2P
transportSpecific       1

# Force Linux to win the BMCA election
priority1               127

# Force the strict gPTP multicast MAC for ALL messages
ptp_dst_mac             01:80:C2:00:00:0E
p2p_dst_mac             01:80:C2:00:00:0E

# Required gPTP TLVs and behaviors
assume_two_step         1
follow_up_info          1
path_trace_enabled      1
gmCapable               1

# Match Zephyr's expected intervals
logAnnounceInterval     0
logSyncInterval         -3
